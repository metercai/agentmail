[http]
addr = "0.0.0.0:38080"
# TLS 证书路径（可选，有证书则启用 HTTPS）
# tls_cert = "/etc/amail-gateway/cert.pem"
# tls_key  = "/etc/amail-gateway/key.pem"

[smtp]
addr = "0.0.0.0:2525"
# TLS 证书路径（可选，有证书则启用 STARTTLS）
# tls_cert = "/etc/amail-gateway/smtp-cert.pem"
# tls_key  = "/etc/amail-gateway/smtp-key.pem"

[webhook]
timeout_secs = 10
pending_ttl_hours = 72

[logging]
level = "info"
# 日志输出到文件（可选，不设置则写 stderr）
file = "/var/log/amail-gateway.log"

[attachments]
dir = "/var/amail/attachments"

[database]
# path 默认为当前目录下的 amail.db
# 生产环境建议用绝对路径配合 PID 保持一致
path = "/var/amail/amail.db"
# SQLCipher 加密（默认开启，仅 advanced edition 有效）
# encryption = true
